services:
  - type: web
    name: iphone-ceylon-mobile-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    # Additional environment variables from your backend/.env must be added manually in the Render dashboard during or after setup.
